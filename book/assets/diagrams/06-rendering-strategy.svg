<svg width="100%" role="img" aria-labelledby="perf-diagram-1-title perf-diagram-1-desc" viewBox="0 0 940 420" xmlns="http://www.w3.org/2000/svg">
  <title id="perf-diagram-1-title">Rendering strategy decision matrix</title>
  <desc id="perf-diagram-1-desc">A matrix compares SSR, SSG, ISR, CSR, and streaming across cacheability, freshness, personalization, and interactivity.</desc>
  <rect x="32" y="44" width="876" height="320" rx="14" fill="#fffdf8" stroke="#ddd3c4" />
  <g font-size="13" font-weight="700" fill="#111211">
    <text x="170" y="88" text-anchor="middle">Strategy</text>
    <text x="330" y="88" text-anchor="middle">Best fit</text>
    <text x="530" y="88" text-anchor="middle">Primary risk</text>
    <text x="735" y="88" text-anchor="middle">Architecture note</text>
    <line x1="70" y1="104" x2="870" y2="104" stroke="#ddd3c4" />
    <text x="170" y="136" text-anchor="middle">SSG</text>
    <text x="330" y="136" text-anchor="middle">Stable public content</text>
    <text x="530" y="136" text-anchor="middle">Staleness</text>
    <text x="735" y="136" text-anchor="middle">Build once, cache hard</text>
    <text x="170" y="184" text-anchor="middle">ISR</text>
    <text x="330" y="184" text-anchor="middle">Mostly static, periodic updates</text>
    <text x="530" y="184" text-anchor="middle">Revalidation drift</text>
    <text x="735" y="184" text-anchor="middle">Define freshness contract</text>
    <text x="170" y="232" text-anchor="middle">SSR</text>
    <text x="330" y="232" text-anchor="middle">Personalized first content</text>
    <text x="530" y="232" text-anchor="middle">Server latency</text>
    <text x="735" y="232" text-anchor="middle">Cache data and avoid waterfalls</text>
    <text x="170" y="280" text-anchor="middle">CSR</text>
    <text x="330" y="280" text-anchor="middle">Highly interactive app surface</text>
    <text x="530" y="280" text-anchor="middle">Blank or delayed content</text>
    <text x="735" y="280" text-anchor="middle">Split JavaScript aggressively</text>
    <text x="170" y="328" text-anchor="middle">Streaming</text>
    <text x="330" y="328" text-anchor="middle">Progressive data and UI</text>
    <text x="530" y="328" text-anchor="middle">Boundary complexity</text>
    <text x="735" y="328" text-anchor="middle">Prioritize useful shell first</text>
    <line x1="70" y1="152" x2="870" y2="152" stroke="#efe8dc" />
    <line x1="70" y1="200" x2="870" y2="200" stroke="#efe8dc" />
    <line x1="70" y1="248" x2="870" y2="248" stroke="#efe8dc" />
    <line x1="70" y1="296" x2="870" y2="296" stroke="#efe8dc" />
  </g>
</svg>