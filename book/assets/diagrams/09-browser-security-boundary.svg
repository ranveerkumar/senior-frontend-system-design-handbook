<svg width="100%" role="img" aria-labelledby="security-diagram-3-title security-diagram-3-desc" viewBox="0 0 940 380" xmlns="http://www.w3.org/2000/svg">
  <title id="security-diagram-3-title">Browser security boundary map</title>
  <desc id="security-diagram-3-desc">A browser boundary contains DOM, JavaScript, storage, cookies, network, extensions, and third-party scripts with backend outside the boundary.</desc>
  <rect x="58" y="54" width="612" height="270" rx="16" fill="#fffdf8" stroke="#8a4f2a" stroke-width="3" />
  <text x="364" y="88" text-anchor="middle" font-size="19" font-weight="700" fill="#111211">Browser boundary</text>
  <g font-size="13.5" font-weight="700" fill="#111211">
    <rect x="96" y="122" width="128" height="48" rx="9" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="160" y="152" text-anchor="middle">DOM + JS</text>
    <rect x="270" y="122" width="128" height="48" rx="9" fill="#edf1ec" stroke="#4f6656" />
    <text x="334" y="152" text-anchor="middle">storage</text>
    <rect x="444" y="122" width="128" height="48" rx="9" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="508" y="152" text-anchor="middle">cookies</text>
    <rect x="96" y="224" width="128" height="48" rx="9" fill="#edf1ec" stroke="#4f6656" />
    <text x="160" y="254" text-anchor="middle">extensions</text>
    <rect x="270" y="224" width="128" height="48" rx="9" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="334" y="254" text-anchor="middle">third-party</text>
    <rect x="444" y="224" width="128" height="48" rx="9" fill="#edf1ec" stroke="#4f6656" />
    <text x="508" y="254" text-anchor="middle">network</text>
    <rect x="734" y="144" width="128" height="78" rx="10" fill="#111713" />
    <text x="798" y="175" text-anchor="middle" fill="#fffdf8">backend</text>
    <text x="798" y="196" text-anchor="middle" fill="#fffdf8">authority</text>
    <path d="M674 184 H724" stroke="#4f6656" stroke-width="3" marker-end="url(#security-arrow3)" />
  </g>
  <defs>
    <marker id="security-arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f6656" />
    </marker>
  </defs>
</svg>