<svg width="100%" role="img" aria-labelledby="failure-diagram-3-title failure-diagram-3-desc" viewBox="0 0 940 320" xmlns="http://www.w3.org/2000/svg">
  <title id="failure-diagram-3-title">Retry and fallback sequence diagram</title>
  <desc id="failure-diagram-3-desc">A sequence from request failure to classification, retry decision, fallback UI, telemetry, and recovery.</desc>
  <rect x="28" y="48" width="884" height="220" rx="14" fill="#fffdf8" stroke="#ddd3c4" />
  <g font-size="13.5" font-weight="700" fill="#111211">
    <rect x="62" y="126" width="106" height="58" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="115" y="150" text-anchor="middle">request</text>
    <text x="115" y="170" text-anchor="middle">fails</text>
    <path d="M172 155 H228" stroke="#4f6656" stroke-width="3" marker-end="url(#failure-arrow3)" />
    <rect x="238" y="126" width="116" height="58" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="296" y="150" text-anchor="middle">classify</text>
    <text x="296" y="170" text-anchor="middle">error</text>
    <path d="M358 155 H414" stroke="#4f6656" stroke-width="3" marker-end="url(#failure-arrow3)" />
    <rect x="424" y="112" width="126" height="86" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="487" y="143" text-anchor="middle">retry?</text>
    <text x="487" y="164" text-anchor="middle">backoff +</text>
    <text x="487" y="185" text-anchor="middle">jitter</text>
    <path d="M554 155 H610" stroke="#4f6656" stroke-width="3" marker-end="url(#failure-arrow3)" />
    <rect x="620" y="126" width="126" height="58" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="683" y="150" text-anchor="middle">fallback</text>
    <text x="683" y="170" text-anchor="middle">or recover</text>
    <path d="M750 155 H806" stroke="#4f6656" stroke-width="3" marker-end="url(#failure-arrow3)" />
    <text x="818" y="160" font-size="14">telemetry</text>
  </g>
  <text x="470" y="232" text-anchor="middle" font-size="15" font-weight="700" fill="#63361f">Retry UX should protect the user and the backend at the same time.</text>
  <defs>
    <marker id="failure-arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f6656" />
    </marker>
  </defs>
</svg>