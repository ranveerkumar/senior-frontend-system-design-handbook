<svg width="100%" role="img" aria-labelledby="security-diagram-1-title security-diagram-1-desc" viewBox="0 0 940 310" xmlns="http://www.w3.org/2000/svg">
  <title id="security-diagram-1-title">Authentication and session flow</title>
  <desc id="security-diagram-1-desc">Browser goes to app, app redirects to identity provider, identity provider returns code, backend creates session, browser uses session cookie for API requests.</desc>
  <rect x="28" y="50" width="884" height="210" rx="14" fill="#fffdf8" stroke="#ddd3c4" />
  <g font-size="13.5" font-weight="700" fill="#111211">
    <rect x="58" y="126" width="112" height="58" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="114" y="150" text-anchor="middle">browser</text>
    <text x="114" y="170" text-anchor="middle">user agent</text>
    <path d="M174 155 H232" stroke="#4f6656" stroke-width="3" marker-end="url(#security-arrow1)" />
    <rect x="242" y="126" width="112" height="58" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="298" y="150" text-anchor="middle">app</text>
    <text x="298" y="170" text-anchor="middle">route</text>
    <path d="M358 155 H416" stroke="#4f6656" stroke-width="3" marker-end="url(#security-arrow1)" />
    <rect x="426" y="116" width="128" height="78" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="490" y="145" text-anchor="middle">identity</text>
    <text x="490" y="165" text-anchor="middle">provider</text>
    <path d="M558 155 H616" stroke="#4f6656" stroke-width="3" marker-end="url(#security-arrow1)" />
    <rect x="626" y="116" width="128" height="78" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="690" y="145" text-anchor="middle">backend</text>
    <text x="690" y="165" text-anchor="middle">session</text>
    <path d="M758 155 H812" stroke="#4f6656" stroke-width="3" marker-end="url(#security-arrow1)" />
    <text x="824" y="160" font-size="14">API</text>
  </g>
  <text x="470" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#63361f">Prefer server-established session boundaries for sensitive app flows.</text>
  <defs>
    <marker id="security-arrow1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f6656" />
    </marker>
  </defs>
</svg>