    <text x="155" y="171" text-anchor="middle">design</text>
    <path d="M218 165 H282" stroke="#4f6656" stroke-width="3" marker-end="url(#platform-arrow1)" />
    <rect x="292" y="136" width="118" height="58" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="351" y="171" text-anchor="middle">tokens</text>
    <path d="M414 165 H478" stroke="#4f6656" stroke-width="3" marker-end="url(#platform-arrow1)" />
    <rect x="488" y="136" width="128" height="58" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="552" y="171" text-anchor="middle">components</text>
