    <rect x="356" y="224" width="220" height="44" rx="10" fill="#111713" />
    <text x="466" y="252" text-anchor="middle" fill="#fffdf8">adoption and velocity metrics</text>
    <path d="M466 222 V199" stroke="#63361f" stroke-width="3" marker-end="url(#platform-arrow1)" />
