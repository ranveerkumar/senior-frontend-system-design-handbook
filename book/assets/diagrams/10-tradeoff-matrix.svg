<svg width="100%" role="img" aria-labelledby="interview-diagram-3-title interview-diagram-3-desc" viewBox="0 0 940 380" xmlns="http://www.w3.org/2000/svg">
  <title id="interview-diagram-3-title">Trade-off matrix for implementation options</title>
  <desc id="interview-diagram-3-desc">A matrix scores implementation options across user impact, complexity, reversibility, performance, and failure behavior.</desc>
  <rect x="36" y="48" width="868" height="270" rx="14" fill="#fffdf8" stroke="#ddd3c4" />
  <g font-size="13" font-weight="700" fill="#111211">
    <text x="140" y="88" text-anchor="middle">Option</text>
    <text x="290" y="88" text-anchor="middle">User impact</text>
    <text x="450" y="88" text-anchor="middle">Complexity</text>
    <text x="610" y="88" text-anchor="middle">Reversible</text>
    <text x="780" y="88" text-anchor="middle">Failure behavior</text>
    <line x1="72" y1="104" x2="868" y2="104" stroke="#ddd3c4" />
    <text x="140" y="138" text-anchor="middle">SSR route</text>
    <text x="290" y="138" text-anchor="middle">fast content</text>
    <text x="450" y="138" text-anchor="middle">medium</text>
    <text x="610" y="138" text-anchor="middle">yes</text>
    <text x="780" y="138" text-anchor="middle">server fallback</text>
    <text x="140" y="186" text-anchor="middle">CSR app</text>
    <text x="290" y="186" text-anchor="middle">rich interaction</text>
    <text x="450" y="186" text-anchor="middle">low start</text>
    <text x="610" y="186" text-anchor="middle">yes</text>
    <text x="780" y="186" text-anchor="middle">blank risk</text>
    <text x="140" y="234" text-anchor="middle">streaming</text>
    <text x="290" y="234" text-anchor="middle">progressive</text>
    <text x="450" y="234" text-anchor="middle">higher</text>
    <text x="610" y="234" text-anchor="middle">partial</text>
    <text x="780" y="234" text-anchor="middle">boundary needed</text>
    <line x1="72" y1="152" x2="868" y2="152" stroke="#efe8dc" />
    <line x1="72" y1="200" x2="868" y2="200" stroke="#efe8dc" />
  </g>
</svg>