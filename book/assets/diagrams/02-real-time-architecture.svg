<svg width="100%" role="img" aria-labelledby="rt-diagram-1-title rt-diagram-1-desc" viewBox="0 0 920 300" xmlns="http://www.w3.org/2000/svg">
  <title id="rt-diagram-1-title">Real-time frontend architecture</title>
  <desc id="rt-diagram-1-desc">A flow from client to connection manager, subscription layer, event processor, state store, and UI.</desc>
  <rect x="24" y="42" width="872" height="216" rx="14" fill="#fffdf8" stroke="#ddd3c4" />
  <g font-size="14" font-weight="700" fill="#111211">
    <rect x="54" y="118" width="110" height="58" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="109" y="142" text-anchor="middle">Client</text>
    <text x="109" y="162" text-anchor="middle">intent</text>
    <path d="M168 147 H220" stroke="#4f6656" stroke-width="3" marker-end="url(#rt-arrow1)" />
    <rect x="231" y="108" width="138" height="78" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="300" y="137" text-anchor="middle">Connection</text>
    <text x="300" y="158" text-anchor="middle">manager</text>
    <path d="M373 147 H425" stroke="#4f6656" stroke-width="3" marker-end="url(#rt-arrow1)" />
    <rect x="436" y="108" width="138" height="78" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="505" y="137" text-anchor="middle">Subscription</text>
    <text x="505" y="158" text-anchor="middle">layer</text>
    <path d="M578 147 H630" stroke="#4f6656" stroke-width="3" marker-end="url(#rt-arrow1)" />
    <rect x="641" y="108" width="118" height="78" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="700" y="137" text-anchor="middle">Event</text>
    <text x="700" y="158" text-anchor="middle">processor</text>
    <path d="M763 147 H803" stroke="#4f6656" stroke-width="3" marker-end="url(#rt-arrow1)" />
    <rect x="812" y="108" width="64" height="78" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="844" y="137" text-anchor="middle">State</text>
    <text x="844" y="158" text-anchor="middle">UI</text>
  </g>
  <text x="460" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#63361f">Raw messages are converted into validated, recoverable product state before rendering</text>
  <defs>
    <marker id="rt-arrow1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f6656" />
    </marker>
  </defs>
</svg>