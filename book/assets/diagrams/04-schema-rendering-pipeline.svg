<svg width="100%" role="img" aria-labelledby="dynamic-diagram-1-title dynamic-diagram-1-desc" viewBox="0 0 940 300" xmlns="http://www.w3.org/2000/svg">
  <title id="dynamic-diagram-1-title">Schema-driven rendering pipeline</title>
  <desc id="dynamic-diagram-1-desc">A flow from schema to resolver, registry, renderer, validation, and submit.</desc>
  <rect x="24" y="42" width="892" height="212" rx="14" fill="#fffdf8" stroke="#ddd3c4" />
  <g font-size="14" font-weight="700" fill="#111211">
    <rect x="56" y="118" width="108" height="62" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="110" y="154" text-anchor="middle">schema</text>
    <path d="M168 149 H218" stroke="#4f6656" stroke-width="3" marker-end="url(#dynamic-arrow1)" />
    <rect x="228" y="118" width="112" height="62" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="284" y="144" text-anchor="middle">resolver</text>
    <text x="284" y="164" text-anchor="middle">context</text>
    <path d="M344 149 H394" stroke="#4f6656" stroke-width="3" marker-end="url(#dynamic-arrow1)" />
    <rect x="404" y="118" width="112" height="62" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="460" y="144" text-anchor="middle">field</text>
    <text x="460" y="164" text-anchor="middle">registry</text>
    <path d="M520 149 H570" stroke="#4f6656" stroke-width="3" marker-end="url(#dynamic-arrow1)" />
    <rect x="580" y="118" width="112" height="62" rx="10" fill="#edf1ec" stroke="#4f6656" />
    <text x="636" y="144" text-anchor="middle">renderer</text>
    <text x="636" y="164" text-anchor="middle">contract</text>
    <path d="M696 149 H746" stroke="#4f6656" stroke-width="3" marker-end="url(#dynamic-arrow1)" />
    <rect x="756" y="110" width="128" height="78" rx="10" fill="#efe8dc" stroke="#8a4f2a" />
    <text x="820" y="140" text-anchor="middle">validation</text>
    <text x="820" y="160" text-anchor="middle">and submit</text>
  </g>
  <text x="470" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#63361f">Schema describes intent. Registered components preserve product and accessibility standards.</text>
  <defs>
    <marker id="dynamic-arrow1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4f6656" />
    </marker>
  </defs>
</svg>